apiVersion: apps/v1
kind: Deployment
metadata:
  name: apex-kinetic-control-plane
  namespace: apex-kinetic
  labels:
    app: apex-kinetic
    role: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apex-kinetic
      role: control-plane
  template:
    metadata:
      labels:
        app: apex-kinetic
        role: control-plane
    spec:
      containers:
        - name: control-plane
          image: apex-kinetic/control-plane:latest
          command: ["python", "/app/main.py"]
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            exec:
              command: ["sh", "-c", "test -r /proc/1/stat"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "test -r /proc/1/stat"]
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
