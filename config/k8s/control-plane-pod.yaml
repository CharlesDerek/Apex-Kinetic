apiVersion: v1
kind: Pod
metadata:
  name: apex-kinetic-control-plane
  namespace: apex-kinetic
  labels:
    role: control-plane
spec:
  containers:
    - name: control-plane
      image: apex-kinetic/control-plane:latest
      command: ["python", "/app/main.py"]
      env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
