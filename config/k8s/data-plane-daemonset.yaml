apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: apex-kinetic-data-plane
  namespace: apex-kinetic
  labels:
    app: apex-kinetic
    role: data-plane
spec:
  selector:
    matchLabels:
      app: apex-kinetic
      role: data-plane
  template:
    metadata:
      labels:
        app: apex-kinetic
        role: data-plane
    spec:
      containers:
        - name: data-plane
          image: apex-kinetic/data-plane:latest
          command: ["/usr/local/bin/data-plane"]
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            exec:
              command: ["sh", "-c", "test -r /proc/1/stat"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "test -r /proc/1/stat"]
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
