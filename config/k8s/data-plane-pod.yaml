apiVersion: v1
kind: Pod
metadata:
  name: apex-kinetic-data-plane
  namespace: apex-kinetic
  labels:
    role: data-plane
spec:
  containers:
    - name: data-plane
      image: apex-kinetic/data-plane:latest
      command: ["/usr/local/bin/data-plane"]
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
