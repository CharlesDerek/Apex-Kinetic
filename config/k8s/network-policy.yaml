apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-kinetic-zero-trust
  namespace: apex-kinetic
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              role: control-plane
      ports:
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 554
  egress:
    - to:
        - podSelector:
            matchLabels:
              role: kafka
      ports:
        - protocol: TCP
          port: 9092
    - to:
        - podSelector:
            matchLabels:
              role: vision-node
      ports:
        - protocol: TCP
          port: 554
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
          except:
            - 10.0.0.0/8
