apiVersion: apps/v1
kind: Deployment
metadata:
  name: apex-kinetic-vision-node
  namespace: apex-kinetic
  labels:
    app: apex-kinetic
    role: vision-node
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apex-kinetic
      role: vision-node
  template:
    metadata:
      labels:
        app: apex-kinetic
        role: vision-node
    spec:
      containers:
        - name: vision-node
          image: apex-kinetic/vision-node:latest
          command: ["/usr/local/bin/vision-node"]
          env:
            - name: RTSP_SOURCE_URL
              value: "rtsp://edge-camera.local/stream"
            - name: NVR_TARGET_HOST
              value: "annke-nvr.local"
            - name: NVR_TARGET_PORT
              value: "554"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["sh", "-c", "test -r /proc/1/stat"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "test -r /proc/1/stat"]
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
